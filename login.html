<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login | Pollos a la Brasa Suárez</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body data-page="login" class="bg-warning d-flex flex-column min-vh-100">
    <!-- HEADER (igual en todas las pantallas) -->
    <nav class="navbar navbar-expand-lg bg-danger border-bottom">
      <div class="container py-2">
        <a
          class="navbar-brand d-flex align-items-center gap-2"
          href="new-order.html"
        >
          <img
            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcThETf6jmAo6y9a1doPDnNOWCVarSMEkiyIBA&s"
            alt="Logo"
            width="42"
            height="42"
            class="rounded-circle"
          />
          <span class="fw-semibold">Pollos a la Brasa Suárez</span>
        </a>

        <div class="ms-auto d-flex gap-2">
          <a
            class="btn btn-outline-secondary"
            href="admin-pedidos.html"
            id="btnListar"
            >Listar pedidos</a
          >
          <a class="btn btn-outline-secondary" href="contactanos.html"
            >Contáctanos</a
          >
          <a class="btn btn-primary" href="login.html" id="btnAuth">Login</a>
        </div>
      </div>
    </nav>

    <!-- CONTENIDO -->
    <main class="container my-4 flex-grow-1">
      <div id="alertBox"></div>

      <div class="row justify-content-center">
        <div class="col-12 col-md-7 col-lg-5">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <h1 class="h4 mb-3">Iniciar sesión</h1>
              <p class="text-muted small mb-4">
                Solo para <b>administradores</b> y <b>cocineros</b>.
              </p>

              <form id="loginForm">
                <div class="mb-3">
                  <label class="form-label">Correo</label>
                  <input
                    type="email"
                    id="loginEmail"
                    class="form-control"
                    placeholder="correo@ejemplo.com"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label">Contraseña</label>
                  <input
                    type="password"
                    id="loginPassword"
                    class="form-control"
                    placeholder="******"
                    required
                  />
                </div>

                <div class="d-grid gap-2">
                  <button class="btn btn-success" type="submit">
                    Iniciar sesión
                  </button>
                  <a class="btn btn-outline-dark" href="register.html"
                    >Registrarse</a
                  >
                </div>
              </form>
            </div>
          </div>

          <div class="text-center mt-3">
            <a href="new-order.html" class="link-secondary small"
              >Volver a Nuevo Pedido</a
            >
          </div>
        </div>
      </div>
    </main>

    <!-- FOOTER (igual en todas las pantallas) -->
    <footer class="bg-white border-top mt-auto">
      <div class="container py-3 text-center small">
        todos los derechos reservados : Luis Herrera 2026
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js" defer></script>
  </body>
</html>
