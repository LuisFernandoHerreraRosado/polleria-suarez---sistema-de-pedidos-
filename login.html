<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login | Pollos a la Brasa Suárez</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>

  <body data-page="login" class="bg-warning-subtle d-flex flex-column min-vh-100">
    <!-- HEADER (igual en todas las pantallas) -->
    <!-- HEADER -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger bg-gradient border-bottom shadow-sm">
      <div class="container py-2">
        <a
          class="navbar-brand d-flex align-items-center gap-2"
          href="new-order.html"
        >
          <img
            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcThETf6jmAo6y9a1doPDnNOWCVarSMEkiyIBA&s"
            alt="Logo"
            width="42"
            height="42"
            class="rounded-circle"
          />
          <span class="fw-bold text-uppercase tracking-wider">Pollos a la Brasa Suárez</span>
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-2 mt-2 mt-lg-0">
            <li class="nav-item">
              <a
                class="btn btn-light btn-sm w-100 shadow-sm"
                href="admin-pedidos.html"
                id="btnListar"
                ><i class="bi bi-list-ul me-1"></i> Listar pedidos</a
              >
            </li>
            <li class="nav-item">
              <a class="btn btn-light btn-sm w-100 shadow-sm" href="contactanos.html"
                ><i class="bi bi-info-circle me-1"></i> Contáctanos</a
              >
            </li>
            <li class="nav-item">
              <a class="btn btn-light btn-sm w-100 text-danger fw-bold" href="login.html" id="btnAuth"><i class="bi bi-box-arrow-in-right me-1"></i> Login</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- CONTENIDO -->
    <main class="container my-4 flex-grow-1">
      <div id="alertBox"></div>

      <div class="row justify-content-center">
        <div class="col-12 col-md-7 col-lg-5">
          <div class="card shadow-sm border-0">
            <div class="card-body p-4">
              <div class="text-center mb-4">
                <img
                  src="https://cdn-icons-png.flaticon.com/512/11284/11284777.png"
                  alt="Login Logo"
                  style="width: 100px"
                />
              </div>
              <h1 class="h4 mb-3 text-center">Iniciar sesión</h1>
              <p class="text-muted small mb-4">
                Solo para <b>administradores</b> y <b>cocineros</b>.
              </p>

              <form id="loginForm">
                <div class="mb-3">
                  <label class="form-label">Correo</label>
                  <input
                    type="email"
                    id="loginEmail"
                    class="form-control"
                    placeholder="correo@ejemplo.com"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label">Contraseña</label>
                  <input
                    type="password"
                    id="loginPassword"
                    class="form-control"
                    placeholder="******"
                    required
                  />
                </div>

                <div class="d-grid gap-2">
                  <button class="btn btn-success shadow-sm" type="submit">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Iniciar sesión
                  </button>
                  <a class="btn btn-outline-dark" href="register.html"
                    ><i class="bi bi-person-plus me-1"></i> Registrarse</a
                  >
                </div>
              </form>
            </div>
          </div>

          <div class="text-center mt-3">
            <a href="new-order.html" class="link-secondary small"
              ><i class="bi bi-arrow-left me-1"></i> Volver a Nuevo Pedido</a
            >
          </div>
        </div>
      </div>
    </main>

    <!-- FOOTER (igual en todas las pantallas) -->
    <!-- FOOTER -->
    <footer class="bg-dark text-white-50 py-4 mt-auto">
      <div class="container text-center">
        <p class="mb-1">Pollos a la Brasa Suárez &copy; 2026</p>
        <small>Todos los derechos reservados : Luis Herrera</small>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js" defer></script>
  </body>
</html>
