<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Listar Pedidos | Pollos a la Brasa Suárez</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>

  <body
    data-page="admin-pedidos"
    class="bg-warning-subtle d-flex flex-column min-vh-100"
  >
    <!-- HEADER -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger bg-gradient border-bottom shadow-sm">
      <div class="container py-2">
        <a
          class="navbar-brand d-flex align-items-center gap-2"
          href="new-order.html"
        >
          <img
            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcThETf6jmAo6y9a1doPDnNOWCVarSMEkiyIBA&s"
            alt="Logo"
            width="42"
            height="42"
            class="rounded-circle"
          />
          <span class="fw-bold">Pollos a la Brasa Suárez</span>
        </a>

        <div class="ms-auto d-flex gap-2">
          <a
            class="btn btn-light"
            href="admin-pedidos.html"
            id="btnListar"
            ><i class="bi bi-list-ul me-1"></i> Listar pedidos</a
          >
          <a class="btn btn-primary shadow-sm" href="login.html" id="btnAuth"><i class="bi bi-box-arrow-in-right me-1"></i> Login</a>
        </div>
      </div>
    </nav>

    <main class="container my-4 flex-grow-1">
      <div id="alertBox"></div>

      <div
        class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3"
      >
        <h1 class="h4 m-0">Pedidos de clientes</h1>
        <a class="btn btn-outline-dark btn-sm shadow-sm" href="stock.html"
          ><i class="bi bi-box-seam me-1"></i> Control de stock</a
        >
      </div>

      <div id="ordersWrap"></div>

      <div class="d-grid d-md-flex justify-content-md-end mt-3">
        <button class="btn btn-outline-secondary shadow-sm" id="btnRegresar">
          <i class="bi bi-arrow-left me-1"></i> Regresar
        </button>
      </div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-dark text-white-50 py-4 mt-auto">
      <div class="container text-center">
        <p class="mb-1">Pollos a la Brasa Suárez &copy; 2026</p>
        <small>Todos los derechos reservados : Luis Herrera</small>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js" defer></script>
