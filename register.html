<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Registrarse | Pollos a la Brasa Suárez</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body data-page="register" class="bg-warning d-flex flex-column min-vh-100">
    <!-- HEADER -->
    <nav class="navbar navbar-expand-lg bg-danger navbar-dark border-bottom">
      <div class="container py-2">
        <a
          class="navbar-brand d-flex align-items-center gap-2"
          href="new-order.html"
        >
          <img
            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcThETf6jmAo6y9a1doPDnNOWCVarSMEkiyIBA&s"
            alt="Logo"
            width="42"
            height="42"
            class="rounded-circle"
          />
          <span class="fw-semibold">Pollos a la Brasa Suárez</span>
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-2 mt-2 mt-lg-0">
            <li class="nav-item">
              <a
                class="btn btn-outline-light btn-sm w-100"
                href="admin-pedidos.html"
                id="btnListar"
                >Listar pedidos</a
              >
            </li>
            <li class="nav-item">
              <a class="btn btn-outline-light btn-sm w-100" href="contactanos.html"
                >Contáctanos</a
              >
            </li>
            <li class="nav-item">
              <a class="btn btn-light btn-sm w-100 text-danger fw-bold" href="login.html" id="btnAuth">Login</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container my-4 flex-grow-1">
      <div id="alertBox"></div>

      <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <h1 class="h4 mb-3">Registrarse</h1>

              <form id="registerForm">
                <div class="row g-3">
                  <div class="col-12 col-md-6">
                    <label class="form-label">Nombre</label>
                    <input
                      type="text"
                      id="regNombre"
                      class="form-control"
                      required
                    />
                  </div>

                  <div class="col-12 col-md-6">
                    <label class="form-label">Apellidos</label>
                    <input
                      type="text"
                      id="regApellidos"
                      class="form-control"
                      required
                    />
                  </div>

                  <div class="col-12 col-md-6">
                    <label class="form-label">Correo</label>
                    <input
                      type="email"
                      id="regEmail"
                      class="form-control"
                      required
                    />
                  </div>

                  <div class="col-12 col-md-6">
                    <label class="form-label">Cargo</label>
                    <select id="regCargo" class="form-select" required>
                      <option value="" selected disabled>Selecciona...</option>
                      <option value="administrador">Administrador</option>
                      <option value="cocinero">Cocinero</option>
                    </select>
                  </div>

                  <div class="col-12 col-md-6">
                    <label class="form-label">Contraseña</label>
                    <input
                      type="password"
                      id="regPassword"
                      class="form-control"
                      required
                    />
                  </div>

                  <div class="col-12 col-md-6">
                    <label class="form-label">Confirmar contraseña</label>
                    <input
                      type="password"
                      id="regConfirm"
                      class="form-control"
                      required
                    />
                  </div>
                </div>

                <div class="d-grid gap-2 mt-4">
                  <button class="btn btn-success" type="submit">
                    Crear cuenta
                  </button>
                  <a class="btn btn-outline-dark" href="login.html"
                    >Ya tengo cuenta</a
                  >
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-white border-top mt-auto">
      <div class="container py-3 text-center small">
        todos los derechos reservados : Luis Herrera 2026
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js" defer></script>
  </body>
</html>
