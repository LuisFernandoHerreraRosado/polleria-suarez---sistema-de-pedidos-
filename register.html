    <main class="container my-4 flex-grow-1">
      <div id="alertBox"></div>

      <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <h1 class="h4 mb-3">Registrarse</h1>

              <form id="registerForm">
                <div class="row g-3">
                  <div class="col-12 col-md-6">
                    <label class="form-label">Nombre</label>
                    <input
                      type="text"
                      id="regNombre"
                      class="form-control"
                      required
                    />
                  </div>

                  <div class="col-12 col-md-6">
                    <label class="form-label">Apellidos</label>
                    <input
                      type="text"
                      id="regApellidos"
                      class="form-control"
                      required
                    />
                  </div>

                  <div class="col-12 col-md-6">
                    <label class="form-label">Correo</label>
                    <input
                      type="email"
                      id="regEmail"
                      class="form-control"
                      required
                    />
                  </div>

                  <div class="col-12 col-md-6">
                    <label class="form-label">Cargo</label>
                    <select id="regCargo" class="form-select" required>
                      <option value="" selected disabled>Selecciona...</option>
                      <option value="administrador">Administrador</option>
                      <option value="cocinero">Cocinero</option>
                    </select>
                  </div>

                  <div class="col-12 col-md-6">
                    <label class="form-label">Contraseña</label>
                    <input
                      type="password"
                      id="regPassword"
                      class="form-control"
                      required
                    />
                  </div>

                  <div class="col-12 col-md-6">
                    <label class="form-label">Confirmar contraseña</label>
                    <input
                      type="password"
                      id="regConfirm"
                      class="form-control"
                      required
                    />
                  </div>
                </div>

                <div class="d-grid gap-2 mt-4">
                  <button class="btn btn-success shadow-sm" type="submit">
                    <i class="bi bi-person-plus me-1"></i> Crear cuenta
                  </button>
                  <a class="btn btn-outline-dark" href="login.html"
                    ><i class="bi bi-box-arrow-in-right me-1"></i> Ya tengo cuenta</a
                  >
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>
