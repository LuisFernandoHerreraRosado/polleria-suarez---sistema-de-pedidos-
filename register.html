  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>

  <body data-page="register" class="bg-warning-subtle d-flex flex-column min-vh-100">
        <!-- HEADER -->
    <!-- HEADER -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger bg-gradient border-bottom shadow-sm">
      <div class="container py-2">
        <a
          class="navbar-brand d-flex align-items-center gap-2"
          href="new-order.html"
        >
          <img
            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcThETf6jmAo6y9a1doPDnNOWCVarSMEkiyIBA&s"
            alt="Logo"
            width="42"
            height="42"
            class="rounded-circle"
          />
          <span class="fw-bold text-uppercase tracking-wider">Pollos a la Brasa Suárez</span>
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-2 mt-2 mt-lg-0">
            <li class="nav-item">
              <a
                class="btn btn-light btn-sm w-100 shadow-sm"
                href="admin-pedidos.html"
                id="btnListar"
                ><i class="bi bi-list-ul me-1"></i> Listar pedidos</a
              >
            </li>
            <li class="nav-item">
              <a
                class="btn btn-light btn-sm w-100 shadow-sm"
                href="reportes.html"
                id="btnReportes"
                ><i class="bi bi-graph-up me-1"></i> Reportes</a
              >
            </li>
            <li class="nav-item">
              <a class="btn btn-light btn-sm w-100 shadow-sm" href="contactanos.html"
                ><i class="bi bi-info-circle me-1"></i> Contáctanos</a
              >
            </li>
            <li class="nav-item">
              <a class="btn btn-light btn-sm w-100 text-danger fw-bold" href="login.html" id="btnAuth"><i class="bi bi-box-arrow-in-right me-1"></i> Login</a>
            </li>
            <li class="nav-item">
              <button class="btn btn-light btn-sm w-100 position-relative" id="btnVerCarrito" type="button">
                <i class="bi bi-cart3"></i>
                <span id="cartCount" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container my-4 flex-grow-1">
      <div id="alertBox"></div>

      <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <h1 class="h4 mb-3">Registrarse</h1>

              <form id="registerForm">
                <div class="row g-3">
                  <div class="col-12 col-md-6">
                    <label class="form-label">Nombre</label>
                    <input
                      type="text"
                      id="regNombre"
                      class="form-control"
                      required
                    />
                  </div>

                  <div class="col-12 col-md-6">
                    <label class="form-label">Apellidos</label>
                    <input
                      type="text"
                      id="regApellidos"
                      class="form-control"
                      required
                    />
                  </div>

                  <div class="col-12 col-md-6">
                    <label class="form-label">Correo</label>
                    <input
                      type="email"
                      id="regEmail"
                      class="form-control"
                      required
                    />
                  </div>

                  <div class="col-12 col-md-6">
                    <label class="form-label">Cargo</label>
                    <select id="regCargo" class="form-select" required>
                      <option value="" selected disabled>Selecciona...</option>
                      <option value="administrador">Administrador</option>
                      <option value="cocinero">Cocinero</option>
                      <option value="cliente">Cliente</option>
                    </select>
                  </div>

                  <div class="col-12 col-md-6">
                    <label class="form-label">Contraseña</label>
                    <input
                      type="password"
                      id="regPassword"
                      class="form-control"
                      required
                    />
                  </div>

                  <div class="col-12 col-md-6">
                    <label class="form-label">Confirmar contraseña</label>
                    <input
                      type="password"
                      id="regConfirm"
                      class="form-control"
                      required
                    />
                  </div>
                </div>

                <div class="d-grid gap-2 mt-4">
                  <button class="btn btn-success shadow-sm" type="submit">
                    <i class="bi bi-person-plus me-1"></i> Crear cuenta
                  </button>
                  <a class="btn btn-outline-dark" href="login.html"
                    ><i class="bi bi-box-arrow-in-right me-1"></i> Ya tengo cuenta</a
                  >
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

        <!-- FOOTER -->
    <!-- FOOTER -->
    <footer class="bg-dark text-white-50 py-4 mt-auto">
      <div class="container text-center">
        <p class="mb-1">Pollos a la Brasa Suárez &copy; 2026</p>
        <small>Todos los derechos reservados : Luis Herrera</small>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js" defer></script>
  </body>
</html>
